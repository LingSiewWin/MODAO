[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"

# Verification uses Sourcify (see DEPLOY.md). The etherscan block was removed
# because Monad testnet's explorer doesn't expose an etherscan-compatible API
# and foundry's transparent lookup during broadcast was returning HTML.
